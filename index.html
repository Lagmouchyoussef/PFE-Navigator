<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>💙 Typescript - STORE</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <h1>💙 Typescript</h1>
        <p class="subtitle">📊 Dashboard Inteligente: 5 funciones detectadas</p>
        <div class="grid">
            <div class="card">
                <div class="card-header">
                    <span class="number">#1</span>
                    <span class="icon">💙</span>
                </div>
                <h3>AppProvider()</h3>
                <button onclick="demo_AppProvider()">▶️ Ejecutar</button>
            </div>
            <div class="card">
                <div class="card-header">
                    <span class="number">#2</span>
                    <span class="icon">💙</span>
                </div>
                <h3>handleChange()</h3>
                <button onclick="demo_handleChange()">▶️ Ejecutar</button>
            </div>
            <div class="card">
                <div class="card-header">
                    <span class="number">#3</span>
                    <span class="icon">💙</span>
                </div>
                <h3>pfeFinalGrade()</h3>
                <button onclick="demo_pfeFinalGrade()">▶️ Ejecutar</button>
            </div>
            <div class="card">
                <div class="card-header">
                    <span class="number">#4</span>
                    <span class="icon">💙</span>
                </div>
                <h3>isProjectValidated()</h3>
                <button onclick="demo_isProjectValidated()">▶️ Ejecutar</button>
            </div>
            <div class="card">
                <div class="card-header">
                    <span class="number">#5</span>
                    <span class="icon">💙</span>
                </div>
                <h3>useApp()</h3>
                <button onclick="demo_useApp()">▶️ Ejecutar</button>
            </div>
        </div>

        <div id="order-history-section" class="card" style="margin-top: 40px; width: 100%; max-width: 1000px;">
            <h2>📜 Historial de Pedidos Recientes</h2>
            <div id="order-history-list">
                <p>No hay pedidos registrados aún.</p>
            </div>
            <button onclick="MockServer.clear('orders')" style="background: #ef4444; margin-top: 20px;">🗑️ Borrar Historial</button>
        </div>
    </div>
    <script src="script.js"></script>
    <script>
        console.log('💙 Typescript: 5 funciones cargadas');
    </script>
</body>
</html>
