name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: test_pfe
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    defaults:
      run:
        working-directory: Backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: Backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run migrations
        env:
          SECRET_KEY: ci-test-secret-key
          DEBUG: "True"
          DATABASE_URL: postgres://postgres:postgres@localhost:5432/test_pfe
          REDIS_URL: redis://localhost:6379/0
        run: python manage.py migrate --noinput

      - name: Run tests with coverage
        env:
          SECRET_KEY: ci-test-secret-key
          DEBUG: "True"
          DATABASE_URL: postgres://postgres:postgres@localhost:5432/test_pfe
          REDIS_URL: redis://localhost:6379/0
        run: |
          pip install pytest-cov
          pytest --cov=. --cov-report=xml --cov-fail-under=70 -q

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        if: always()
        with:
          files: Backend/coverage.xml

  frontend:
    name: Frontend Build & Lint
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: Frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: Frontend/package-lock.json

      - name: Install dependencies
        run: npm ci --frozen-lockfile

      - name: Type check
        run: npm run type-check

      - name: Lint
        run: npm run lint

      - name: Build
        env:
          VITE_API_BASE_URL: http://localhost:8000
          VITE_WS_URL: ws://localhost:8000
        run: npm run build

      - name: Run unit tests
        run: npm run test -- --run

  docker:
    name: Docker Build Check
    runs-on: ubuntu-latest
    needs: [backend, frontend]

    steps:
      - uses: actions/checkout@v4

      - name: Build backend image
        run: docker build -t pfe-backend ./Backend

      - name: Build frontend image
        run: docker build -t pfe-frontend ./Frontend
